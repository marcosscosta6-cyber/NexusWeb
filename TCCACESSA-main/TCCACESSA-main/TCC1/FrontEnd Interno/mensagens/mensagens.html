<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagens</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="mensagens.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Belanosima:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="mensagens">

        <aside class="sidebar-chat">

            <div class="titulo-chat">
                <h2>Mensagens</h2>
            </div>

            <div class="contato" onclick="abrirChat('Lucas Costa')">
                <img src="https://i.pravatar.cc/100?img=1">
                <span>Lucas Costa</span>
            </div>

            <div class="contato" onclick="abrirChat('Marina Alves')">
                <img src="https://i.pravatar.cc/100?img=5">
                <span>Marina Alves</span>
            </div>

            <div class="contato" onclick="abrirChat('Pedro Souza')">
                <img src="https://i.pravatar.cc/100?img=8">
                <span>Pedro Souza</span>
            </div>

        </aside>

        <!-- Tela Inicial -->

        <section class="chat-vazio" id="chatVazio">

            <div class="conteudo-vazio">

                <i class="fa-solid fa-comments"></i>

                <h1>Suas Mensagens</h1>

                <p>
                    Selecione uma conversa para começar.
                </p>

            </div>

        </section>

        <!-- Chat -->

        <section class="chat-content" id="chatContent">

            <header class="chat-header">

                <div class="chat-user">

                     <button class="btn-voltar" onclick="voltarMensagens()">
                        <i class="fa-solid fa-arrow-left"></i>
                     </button>

                    <img src="https://i.pravatar.cc/100?img=1">

                    <h3 id="nomeUsuario">
                        Lucas Costa
                    </h3>

                </div>

            </header>

            <div class="messages">

                <div class="message received">
                    Oi! Tudo bem?
                </div>

                <div class="message sent">
                    Tudo sim! E você?
                </div>

                <div class="message received">
                    Estou ótimo.
                </div>

            </div>

            <div class="chat-input">

                <input
                    type="text"
                    placeholder="Digite uma mensagem...">

                <button>
                    <i class="fa-solid fa-paper-plane"></i>
                </button>

            </div>

        </section>

    </main>

    <script src="mensagens.js"></script>


</body>
</html>
